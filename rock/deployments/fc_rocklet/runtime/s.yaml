# =============================================================================
# FC Custom Runtime Deployment Configuration
# =============================================================================
#
# 方案 B：使用自定义运行时部署 rocklet
#
# 部署步骤：
#   1. 执行 ./package.sh 打包代码
#   2. 执行: s deploy
#
# 注意：首次冷启动较慢（需要安装依赖）
#
# =============================================================================

edition: 3.0.0
name: rock-serverless-runtime-rocklet
access: default

vars:
  region: cn-hangzhou
  functionName: rock-serverless-runtime-rocklet

resources:
  rock-rocklet:
    component: fc3
    props:
      region: ${vars.region}
      functionName: ${vars.functionName}
      description: "ROCK Rocklet Sandbox Runtime (Custom Runtime)"
      
      # 使用自定义运行时（Debian 12 带 Python 3.11）
      runtime: custom.debian12
      handler: index.handler
      
      # 自定义运行时配置
      customRuntimeConfig:
        command:
          - /bin/bash
          - /code/bootstrap
        port: 9000
      
      # 代码配置（使用打包后的 zip）
      code: ./dist/fc_rocklet_runtime.zip
      
      # 资源配置
      memorySize: 4096
      cpu: 2
      diskSize: 10240
      timeout: 3600
      
      # 单实例多并发
      instanceConcurrency: 200
      
      # 会话隔离配置
      instanceIsolationMode: SESSION_EXCLUSIVE
      sessionAffinity: HEADER_FIELD
      sessionAffinityConfig:
        affinityHeaderFieldName: x-rock-session-id
        sessionConcurrencyPerInstance: 1
        sessionIdleTimeoutInSeconds: 60
        sessionTTLInSeconds: 600
      
      # 环境变量
      environmentVariables:
        PYTHONUNBUFFERED: "1"
        PYTHONDONTWRITEBYTECODE: "1"

      # 日志配置（auto 自动创建 SLS 项目，后续部署沿用已创建的配置）
      logConfig: auto

      # HTTP 触发器
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
