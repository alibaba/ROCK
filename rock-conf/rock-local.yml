ray:
    runtime_env:
        working_dir: ./
        pip: ./requirements_sandbox_actor.txt
    namespace: "rock-sandbox-local"

warmup:
    images:
      - "python:3.11"

runtime:
    enable_gpu_passthrough: true
    gpu_allocation_mode: "round_robin"
    gpu_count_per_sandbox: 1
    gpu_device_request: "all"
