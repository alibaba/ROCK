logging:
  exception_traceback_enabled: true

# K8S deployment configuration
k8s:
  # Kubeconfig path (None for in-cluster config)
  kubeconfig_path: ""
  
  # Global namespace for all sandboxes
  namespace: "rock"

  # API client configuration
  # Rate limiting
  api_qps: 20.0

  # Watch configuration
  resync_period: 60
  
  # Template definitions - corresponds to spec.template in BatchSandbox CRD
  # Top-level fields (apiVersion, kind, metadata, spec.replicas) are hardcoded in code
  templates:
    # Default template - basic pod template
    default:
      # Enable resource speedup label when building BatchSandbox CR
      enable_resource_speedup: true
      # Port configuration for the sandbox service
      ports:
        proxy: 8000    # HTTP API port (rocklet/swerex-remote)
        server: 8080   # WebSocket server port (same service)
        ssh: 22        # SSH service port
      # Pod template (corresponds to spec.template in BatchSandbox)
      template:
        metadata:
          labels:
            example.app: rock-sandbox
        spec:
          tolerations:
            - operator: "Exists"
          containers:
            - name: main
              image: python:3.11
              command:
                - "/bin/sh"
                - "-c"
                - |
                  pip install rl-rock[rocklet]
                  rocklet


# Image registry mirror — configured via Nacos (hot-reload supported).
# Nacos YAML format:
#
# image_registry_mirrors:
#   - registry: "rock-registry.cn-hangzhou.cr.aliyuncs.com"
#     namespace: "rock-public"
#     username: "user"            # optional
#     password: "<plaintext>"     # optional
#   - registry: "rock-registry-backup.cn-hangzhou.cr.aliyuncs.com"
#     namespace: "rock-mirror"
#
# image_mirror_lookup_allowlist:  # empty = disabled, ["*"] = all images
#   - "*"
#   - "swe-bench:"               # bare image name prefix
#   - "aaaaaa/bbb/"              # registry/namespace prefix

# Runtime configuration
runtime:
  # Operator type: 'ray', 'k8s', or 'opensandbox'
  operator_type: "k8s"

# OpenSandbox operator backend (used when runtime.operator_type == "opensandbox").
# Rock delegates the sandbox lifecycle to an external OpenSandbox service via its
# Python SDK. Uncomment and fill in to switch this admin cluster to opensandbox.
#
# opensandbox:
#   endpoint: "opensandbox.internal:8090"   # OpenSandbox server host (SDK domain)
#   api_key: ""                             # or leave empty to use OPEN_SANDBOX_API_KEY env
#   protocol: "https"                       # "http" or "https"
#   runtime: "docker"                       # OpenSandbox runtime: "docker" or "k8s" (informational)
#   image_registry_prefix: ""                # prefix incomplete image names; empty lets OpenSandbox decide
#   namespace: "rock"                       # label/namespace scope for sandboxes
#   use_server_proxy: false                 # route execd (cmd/file) via server; enable only if the deployment supports it
#   default_timeout: 600                    # SDK request timeout (seconds)
