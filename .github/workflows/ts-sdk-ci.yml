name: TS SDK CI

on:
  push:
    branches: [master, release/**]
  pull_request:
    branches: [master, release/**]
  workflow_dispatch:

concurrency:
  group: ts-sdk-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rock/ts-sdk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          npm install -g pnpm

      - name: Install dependencies
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          pnpm install --frozen-lockfile

      - name: Run unit tests
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          pnpm test:unit

  integration-test:
    runs-on: self-hosted
    timeout-minutes: 20
    defaults:
      run:
        working-directory: rock/ts-sdk
    steps:
      - uses: actions/checkout@v4

      - name: Cleanup old Ray sessions
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          ray stop --force 2>/dev/null || true
          docker rm -f $(docker ps -aq) 2>/dev/null || true
        working-directory: .

      - name: Install Python dependencies with uv
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          uv sync --all-extras --python 3.11
        working-directory: .

      - name: Pull test Docker image
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          docker image inspect python:3.11 > /dev/null 2>&1 || docker pull python:3.11
        working-directory: .

      - name: Start ROCK Admin server
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          export ROCK_WORKER_ENV_TYPE=uv
          nohup uv run admin --env ci --role admin --port 8080 > /tmp/rock-admin.log 2>&1 &
          echo $! > /tmp/rock-admin.pid
          echo "Waiting for Admin server to be ready..."
          for i in $(seq 1 60); do
            if grep -q "Uvicorn running on" /tmp/rock-admin.log 2>/dev/null; then
              echo "Admin server is ready!"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Admin server failed to start within 60 seconds"
              cat /tmp/rock-admin.log
              exit 1
            fi
            sleep 1
          done
        working-directory: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          npm install -g pnpm

      - name: Install dependencies
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          pnpm install --frozen-lockfile

      - name: Run integration tests
        env:
          ROCK_BASE_URL: http://127.0.0.1:8080
          ROCK_TEST_IMAGE: python:3.11
          ROCK_TEST_CLUSTER: default
          ROCK_STARTUP_TIMEOUT: "600"
          ROCK_TEST_TIMEOUT: "660000"
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          pnpm test:integration

      - name: Print debug logs
        if: always()
        run: |
          echo "=== Admin server logs ==="
          cat /tmp/rock-admin.log 2>/dev/null || echo "No admin log found"
          echo ""
          echo "=== Docker containers ==="
          docker ps -a 2>/dev/null || true
          echo ""
          echo "=== Ray status ==="
          ray status 2>/dev/null || true
        working-directory: .

      - name: Cleanup
        if: always()
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          if [ -f /tmp/rock-admin.pid ]; then
            kill $(cat /tmp/rock-admin.pid) 2>/dev/null || true
          fi
          ray stop --force 2>/dev/null || true
          docker rm -f $(docker ps -aq) 2>/dev/null || true
        working-directory: .


