name: Test CI

on:
  push:
    branches: [master, release/**]
  pull_request:
    branches: [master, release/**]
  workflow_dispatch:
    inputs:
      skip_integration:
        description: "Skip integration tests"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: test-ci-${{ github.ref }}
  cancel-in-progress: true

# ==============================================================================
# Single-job workflow — shows as one line in PR checks.
#
# Steps run in order:
#   1. Setup (install dependencies)
#   2. Unit / Fast
#   3. Unit / Ray
#   4. Unit / Admin
#   5. Unit / Admin + Network
#   6. Integration / Ray
#   7. Integration / Admin
#   8. Integration / Admin + Network
# ==============================================================================

jobs:
  test:
    runs-on: self-hosted
    env:
      PYTHON_VERSION: "3.11"
      ROCK_LOGGING_LEVEL: "INFO"
      ROCK_ADMIN_ENV: "dev"
    steps:
      - uses: actions/checkout@v4

      # --- Setup ---------------------------------------------------------------

      - name: Cleanup old Ray sessions
        run: |
          target="$(readlink -f /tmp/ray 2>/dev/null || echo /tmp/ray)"
          [ -d "$target" ] || exit 0
          find "$target" -mindepth 1 -maxdepth 1 -type d -name 'session_*' -mmin +60 -exec rm -rf -- {} + || true

      - name: Install dependencies
        run: uv sync --all-extras --group test --python ${{ env.PYTHON_VERSION }}


      # --- Phase 1: Unit Tests ------------------------------------------------

      - name: Unit / Fast
        run: |
          mkdir -p data/logs reports
          echo "========================================"; echo "  Unit / Fast"; echo "  $(date '+%Y-%m-%d %H:%M:%S')"; echo "========================================"
          uv run pytest tests/unit -n auto \
            -m "not need_ray and not need_admin and not need_admin_and_network and not need_docker and not need_database" \
            --reruns 1 --junitxml=reports/unit-fast.xml
        env:
          ROCK_WORKER_ENV_TYPE: local

      - name: Unit / Ray
        run: |
          echo "========================================"; echo "  Unit / Ray"; echo "  $(date '+%Y-%m-%d %H:%M:%S')"; echo "========================================"
          uv run pytest tests/unit -n auto -m "need_ray" --reruns 1 --junitxml=reports/unit-ray.xml

      - name: Unit / Admin
        run: |
          echo "========================================"; echo "  Unit / Admin"; echo "  $(date '+%Y-%m-%d %H:%M:%S')"; echo "========================================"
          set +e
          uv run pytest tests/unit -n auto -m "need_admin" --reruns 1 --junitxml=reports/unit-admin.xml
          rc=$?; set -e
          if [ $rc -eq 5 ]; then echo "[SKIP] No 'need_admin' tests in tests/unit/. Will run in Integration phase."; exit 0; fi
          exit $rc

      - name: Unit / Admin + Network
        run: |
          echo "========================================"; echo "  Unit / Admin + Network"; echo "  $(date '+%Y-%m-%d %H:%M:%S')"; echo "========================================"
          set +e
          uv run pytest tests/unit -n auto -m "need_admin_and_network" --reruns 1 --junitxml=reports/unit-admin-network.xml
          rc=$?; set -e
          if [ $rc -eq 5 ]; then echo "[SKIP] No 'need_admin_and_network' tests in tests/unit/. Will run in Integration phase."; exit 0; fi
          exit $rc

      # --- Phase 2: Integration Tests -----------------------------------------

      - name: Check Docker
        if: ${{ github.event.inputs.skip_integration != 'true' }}
        run: docker info > /dev/null 2>&1 || { echo "Docker is not available"; exit 1; }

      - name: Integration / Ray
        if: ${{ github.event.inputs.skip_integration != 'true' }}
        run: |
          echo "========================================"; echo "  Integration / Ray"; echo "  $(date '+%Y-%m-%d %H:%M:%S')"; echo "========================================"
          set +e
          uv run pytest tests/integration -n auto -m "need_ray" --reruns 1 --junitxml=reports/integration-ray.xml
          rc=$?; set -e
          if [ $rc -eq 5 ]; then echo "[SKIP] No 'need_ray' tests in tests/integration/."; exit 0; fi
          exit $rc
        env:
          ROCK_WORKER_ENV_TYPE: local

      - name: Integration / Admin
        if: ${{ github.event.inputs.skip_integration != 'true' }}
        run: |
          echo "========================================"; echo "  Integration / Admin"; echo "  $(date '+%Y-%m-%d %H:%M:%S')"; echo "========================================"
          set +e
          uv run pytest tests/integration -n auto -m "need_admin" --reruns 1 --junitxml=reports/integration-admin.xml
          rc=$?; set -e
          if [ $rc -eq 5 ]; then echo "[SKIP] No 'need_admin' tests in tests/integration/."; exit 0; fi
          exit $rc
        env:
          ROCK_WORKER_ENV_TYPE: local

      - name: Integration / Admin + Network
        if: ${{ github.event.inputs.skip_integration != 'true' }}
        run: |
          echo "========================================"; echo "  Integration / Admin + Network"; echo "  $(date '+%Y-%m-%d %H:%M:%S')"; echo "========================================"
          set +e
          uv run pytest tests/integration -n auto -m "need_admin_and_network" --reruns 1 --junitxml=reports/integration-admin-network.xml
          rc=$?; set -e
          if [ $rc -eq 5 ]; then echo "[SKIP] No 'need_admin_and_network' tests in tests/integration/."; exit 0; fi
          exit $rc
        env:
          ROCK_WORKER_ENV_TYPE: local

      # --- Upload Reports -----------------------------------------------------

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          if-no-files-found: ignore
          retention-days: 7
